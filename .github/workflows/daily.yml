name: Daily Commit

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update file
        run: |
          echo "Daily update $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config --global user.name "Anju saini"
          git config --global user.email "anju.saini123123123@gmail.com"

          git add daily-log.txt
          git commit -m "Daily update" || exit 0
          git push
